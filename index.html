<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peter Gales — Shared Artifacts</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f8f6;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e4e4e0;
      border-radius: 12px;
      padding: 3rem 3.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      color: #555;
      line-height: 1.6;
    }
    .divider {
      border: none;
      border-top: 1px solid #e4e4e0;
      margin: 2rem 0;
    }
    .domain {
      font-size: 0.85rem;
      color: #aaa;
      font-family: "SF Mono", "Fira Code", monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">Shared Artifacts</p>
    <h1>Peter Gales</h1>
    <p>This domain hosts artifacts and deliverables shared from Peter Gales' personal and professional work.</p>
    <hr class="divider">
    <p class="domain">share.petergales.com</p>
  </div>
</body>
</html>
